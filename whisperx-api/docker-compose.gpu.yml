services:
  whisperx-api:
    container_name: whisperx-api-gpu
    build:
      context: .
      dockerfile: Dockerfile
    image: cybert/whisperx-api:gpu
    ports:
      - "8088:8000"
    volumes:
      - ../uploads:/app/uploads
      - ./whisper_models:/app/wx_models
    environment:
      WHISPER_MODELS: tiny,small
      UPLOAD_DIR: /app/uploads
      WHISPER_MODELS_DIR: /app/wx_models
      WHISPER_THREADS: 2
      WHISPER_DEVICE: cuda
      WHISPER_HF_TOKEN: $WHISPER_HF_TOKEN
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
